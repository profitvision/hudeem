<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекер веса</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f5f5f5;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }
        .target {
            font-size: 16px;
            background: #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .progress-box {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-line;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #2196F3;
            color: white;
            text-align: center;
        }
        .btn-secondary {
            background: #9E9E9E;
        }
        .btn-danger {
            background: #f44336;
        }
        .list-item {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
        }
        .list-item .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item .date {
            font-weight: bold;
            font-size: 16px;
        }
        .list-item .weight {
            font-size: 16px;
        }
        .list-item .diff {
            font-size: 14px;
            margin-left: 8px;
        }
        .list-item .food {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-top: 4px;
        }
        .modal-content .modal-btns {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .modal-content .modal-btns button {
            flex: 1;
        }
        .chart-container {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }
        .chart-container canvas {
            width: 100% !important;
            height: 250px !important;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚖️ Мой вес</h1>
        <span class="target" id="targetDisplay">Цель: 67 кг</span>
    </div>

    <div class="progress-box" id="progressBox">
        Нет записей
    </div>

    <div class="btn-group">
        <button class="btn" id="addBtn">➕ Добавить</button>
        <button class="btn btn-secondary" id="chartToggle">📊 График</button>
    </div>

    <div id="listContainer"></div>

    <div class="chart-container" id="chartContainer">
        <canvas id="weightChart"></canvas>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Добавить запись</h3>
        <label>Дата (YYYY-MM-DD)</label>
        <input type="date" id="inputDate">
        <label>Вес (кг)</label>
        <input type="number" step="0.1" id="inputWeight" placeholder="90.5">
        <label>Что съели?</label>
        <textarea id="inputFood" rows="2" placeholder="Завтрак: овсянка..."></textarea>
        <div class="modal-btns">
            <button class="btn" id="saveBtn">Сохранить</button>
            <button class="btn btn-secondary" id="cancelBtn">Отмена</button>
            <button class="btn btn-danger" id="deleteBtn" style="display:none;">Удалить</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // ========== ДАННЫЕ ==========
    const STORAGE_KEY = 'weightEntries';
    const TARGET_KEY = 'targetWeight';

    // Загрузка из localStorage
    let entries = [];
    let targetWeight = 67;
    let editingId = null; // id редактируемой записи

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        entries = stored ? JSON.parse(stored) : [];
        const t = localStorage.getItem(TARGET_KEY);
        if (t) targetWeight = parseFloat(t);
        document.getElementById('targetDisplay').textContent = 'Цель: ' + targetWeight + ' кг';
    }

    function saveEntries() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function saveTarget() {
        localStorage.setItem(TARGET_KEY, targetWeight.toString());
    }

    // ========== ОТОБРАЖЕНИЕ ==========
    function render() {
        // Сортируем по дате (сначала новые)
        const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date));
        const container = document.getElementById('listContainer');
        if (sorted.length === 0) {
            container.innerHTML = '<div class="empty">Нет записей. Добавьте первую!</div>';
            document.getElementById('progressBox').textContent = 'Нет записей';
            return;
        }

        // Прогресс
        const asc = [...entries].sort((a,b) => a.date.localeCompare(b.date));
        const first = asc[0];
        const last = asc[asc.length-1];
        const totalLost = first.weight - last.weight;
        const dailyChange = asc.length > 1 ? last.weight - asc[asc.length-2].weight : 0;
        const days = asc.length;

        let dailyText = dailyChange < 0 ? '↓ ' + Math.abs(dailyChange).toFixed(2) :
                        dailyChange > 0 ? '↑ ' + dailyChange.toFixed(2) : '0';
        document.getElementById('progressBox').innerHTML =
            `Текущий: ${last.weight.toFixed(2)} кг\n` +
            `Изменение за день: ${dailyText} кг\n` +
            `Всего сброшено: ${totalLost.toFixed(2)} кг\n` +
            `Дней: ${days}`;

        // Список
        let html = '';
        for (let i = 0; i < sorted.length; i++) {
            const entry = sorted[i];
            const prev = (i < sorted.length - 1) ? sorted[i+1] : null;
            let diff = 0;
            if (prev) diff = entry.weight - prev.weight;
            let diffText = diff < 0 ? '↓ ' + Math.abs(diff).toFixed(2) :
                           diff > 0 ? '↑ ' + diff.toFixed(2) : '0';
            let diffColor = diff < 0 ? 'green' : diff > 0 ? 'red' : 'gray';
            html += `
                <div class="list-item" data-id="${entry.id}">
                    <div class="row">
                        <span class="date">${entry.date}</span>
                        <span>
                            <span class="weight">${entry.weight.toFixed(2)} кг</span>
                            <span class="diff" style="color:${diffColor};">${diffText}</span>
                            <button class="delete-btn" onclick="deleteEntry(${entry.id})">✕</button>
                        </span>
                    </div>
                    <div class="food">${entry.food || '—'}</div>
                </div>
            `;
        }
        container.innerHTML = html;

        // Обновить график
        updateChart();
    }

    // ========== ГРАФИК ==========
    let chartInstance = null;
    function updateChart() {
        const ctx = document.getElementById('weightChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const sorted = [...entries].sort((a,b) => a.date.localeCompare(b.date));
        if (sorted.length === 0) {
            document.getElementById('chartContainer').style.display = 'none';
            return;
        }

        const labels = sorted.map(e => e.date);
        const data = sorted.map(e => e.weight);
        const targetData = sorted.map(() => targetWeight);

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Вес (кг)',
                        data: data,
                        borderColor: 'blue',
                        backgroundColor: 'rgba(0,0,255,0.1)',
                        tension: 0.2,
                        fill: true,
                        pointRadius: 4
                    },
                    {
                        label: 'Цель',
                        data: targetData,
                        borderColor: 'red',
                        borderDash: [6, 4],
                        fill: false,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true }
                },
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });
        document.getElementById('chartContainer').style.display = 'block';
    }

    // ========== ДОБАВЛЕНИЕ / РЕДАКТИРОВАНИЕ ==========
    function showModal(entry = null) {
        const modal = document.getElementById('modal');
        const title = document.getElementById('modalTitle');
        const inputDate = document.getElementById('inputDate');
        const inputWeight = document.getElementById('inputWeight');
        const inputFood = document.getElementById('inputFood');
        const deleteBtn = document.getElementById('deleteBtn');

        if (entry) {
            title.textContent = 'Редактировать запись';
            inputDate.value = entry.date;
            inputWeight.value = entry.weight;
            inputFood.value = entry.food || '';
            deleteBtn.style.display = 'block';
            editingId = entry.id;
        } else {
            title.textContent = 'Добавить запись';
            const today = new Date().toISOString().split('T')[0];
            inputDate.value = today;
            inputWeight.value = '';
            inputFood.value = '';
            deleteBtn.style.display = 'none';
            editingId = null;
        }
        modal.classList.add('show');
    }

    function hideModal() {
        document.getElementById('modal').classList.remove('show');
        editingId = null;
    }

    function saveModal() {
        const date = document.getElementById('inputDate').value;
        const weight = parseFloat(document.getElementById('inputWeight').value);
        const food = document.getElementById('inputFood').value.trim();

        if (!date || isNaN(weight) || weight <= 0) {
            alert('Введите корректную дату и вес');
            return;
        }

        if (editingId !== null) {
            // Редактирование
            const index = entries.findIndex(e => e.id === editingId);
            if (index !== -1) {
                entries[index] = { ...entries[index], date, weight, food };
            }
        } else {
            // Новая запись
            const newEntry = {
                id: Date.now(),
                date: date,
                weight: weight,
                food: food
            };
            entries.push(newEntry);
        }
        saveEntries();
        render();
        hideModal();
    }

    function deleteEntry(id) {
        if (confirm('Удалить запись?')) {
            entries = entries.filter(e => e.id !== id);
            saveEntries();
            render();
        }
    }

    // ========== СОБЫТИЯ ==========
    document.getElementById('addBtn').addEventListener('click', () => showModal(null));
    document.getElementById('saveBtn').addEventListener('click', saveModal);
    document.getElementById('cancelBtn').addEventListener('click', hideModal);
    document.getElementById('deleteBtn').addEventListener('click', function() {
        if (editingId !== null) {
            if (confirm('Удалить запись?')) {
                entries = entries.filter(e => e.id !== editingId);
                saveEntries();
                render();
                hideModal();
            }
        }
    });

    document.getElementById('chartToggle').addEventListener('click', function() {
        const container = document.getElementById('chartContainer');
        if (container.style.display === 'none' || container.style.display === '') {
            if (entries.length > 0) {
                container.style.display = 'block';
                updateChart();
            } else {
                alert('Нет данных для графика');
            }
        } else {
            container.style.display = 'none';
        }
    });

    // Инициализация
    loadData();
    render();

    // Для webintoapp: можно также подписать target, если хотите
    // Добавим возможность менять цель через консоль (опционально)
</script>
</body>
</html>
